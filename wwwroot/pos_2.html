</head>

<body>

    <h2>POS Fluido</h2>

    <button onclick="nuevoTicket()">+ Nuevo Cliente</button> <button onclick="abrirPanel()">+ Producto</button>

    <h3>Tickets</h3>
    <div id="tickets"></div>

    <h3>Productos</h3>
    <div id="productos"></div>

    <h3>Carrito</h3>
    <table>
        <thead>
            <tr>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>Precio</th>
                <th>Subtotal</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="carrito"></tbody>
    </table>

    <h3>Total: $<span id="total">0</span></h3>

    <button onclick="finalizarVenta()">Finalizar Venta</button>

    <h3>Listado de Productos</h3>

    <input type="text" id="buscarProducto" placeholder="Buscar..." oninput="filtrarProductos()" />

    <table>
        <thead>
            <tr>
                <th>Código</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tablaProductos"></tbody>
    </table>

    <!-- PANEL -->

    <div id="panel">
        <h3 id="tituloPanel">Nuevo Producto</h3>

        ```
        <input id="nombre" placeholder="Nombre" />
        <input id="precio" type="number" placeholder="Precio" />

        <button onclick="guardarProducto()">Guardar</button>
        <button onclick="cerrarPanel()">Cerrar</button>
        ```

    </div>

    <div id="toast"></div>

    <script>

        let productos = [];
        let tickets = [];
        let ticketActivo = null;
        let productoEditando = null;

        /* PANEL */
        function abrirPanel() { document.getElementById("panel").classList.add("open"); }
        function cerrarPanel() {
            document.getElementById("panel").classList.remove("open");
            limpiarFormulario();
        }

        function limpiarFormulario() {
            document.getElementById("nombre").value = "";
            document.getElementById("precio").value = "";
            productoEditando = null;
            document.getElementById("tituloPanel").innerText = "Nuevo Producto";
        }

        /* FETCH */
        async function fetchTimeout(url, options = {}, timeout = 2000) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);

            try {
                const response = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(id);
                return response;
            } catch (error) {
                clearTimeout(id);
                throw error;
            }
        }

        /* CRUD PRODUCTOS */
        function editarProducto(id) {
            const p = productos.find(x => x.id === id);
            if (!p) return;

            productoEditando = p;

            document.getElementById("nombre").value = p.nombre;
            document.getElementById("precio").value = p.precio;
            document.getElementById("tituloPanel").innerText = "Editar Producto";

            abrirPanel();
        }

        async function eliminarProducto(id) {
            if (!confirm("¿Eliminar producto?")) return;

            try {
                await fetchTimeout(`http://localhost:5210/productos/${id}`, { method: "DELETE" });
                mostrarToast("Eliminado ✔");
                cargarProductos();
            } catch {
                mostrarToast("Error eliminando");
            }
        }

        async function guardarProducto() {
            const nombre = document.getElementById("nombre").value.trim();
            const precio = parseFloat(document.getElementById("precio").value);

            if (!nombre || isNaN(precio)) {
                mostrarToast("Datos inválidos");
                return;
            }

            try {
                if (productoEditando) {
                    await fetchTimeout(`http://localhost:5210/productos/${productoEditando.id}`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            id: productoEditando.id,
                            nombre,
                            precio,
                            tipo: "General"
                        })
                    });

                    mostrarToast("Actualizado ✔");

                } else {
                    await fetchTimeout("http://localhost:5210/productos", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ nombre, precio, tipo: "General" })
                    });

                    mostrarToast("Creado ✔");
                }

                cerrarPanel();
                cargarProductos();

            } catch {
                mostrarToast("Error guardando");
            }
        }

        /* PRODUCTOS */
        async function cargarProductos() {
            try {
                const res = await fetchTimeout("http://localhost:5210/productos");
                productos = await res.json();

                const div = document.getElementById("productos");
                div.innerHTML = "";

                productos.forEach(p => {
                    const btn = document.createElement("button");
                    btn.innerText = p.nombre + " $" + p.precio;
                    btn.onclick = () => agregar(p);
                    div.appendChild(btn);
                });

                renderTablaProductos();

            } catch {
                mostrarToast("Error cargando productos");
            }
        }

        /* 🔥 TABLA CORREGIDA */
        function renderTablaProductos(lista = productos) {
            const tbody = document.getElementById("tablaProductos");
            tbody.innerHTML = "";

            lista.forEach(p => {
                const tr = document.createElement("tr");

                // CLICK FILA → carrito
                tr.onclick = () => agregar(p);

                tr.innerHTML = `
                <td>${p.id}</td>
                <td>${p.nombre}</td>
                <td>$${p.precio}</td>
                <td>
                    <button onclick="event.stopPropagation(); editarProducto(${p.id})">✏️</button>
                    <button onclick="event.stopPropagation(); eliminarProducto(${p.id})">🗑️</button>
                </td>
            `;

                tbody.appendChild(tr);
            });
        }

        function filtrarProductos() {
            const texto = document.getElementById("buscarProducto").value.toLowerCase();

            const filtrados = productos.filter(p =>
                p.nombre.toLowerCase().includes(texto) ||
                p.id.toString().includes(texto)
            );

            renderTablaProductos(filtrados);
        }

        /* TICKETS */
        function nuevoTicket() {
            const ticket = { id: Date.now(), carrito: [] };
            tickets.push(ticket);
            ticketActivo = ticket;
            renderTickets();
            render();
        }

        function renderTickets() {
            const div = document.getElementById("tickets");
            div.innerHTML = "";

            tickets.forEach(t => {
                const btn = document.createElement("div");
                btn.className = "ticket " + (t.id === ticketActivo?.id ? "activo" : "");
                btn.innerText = "Cliente " + t.id;

                btn.onclick = () => {
                    ticketActivo = t;
                    renderTickets();
                    render();
                };

                div.appendChild(btn);
            });
        }

        /* CARRITO */
        function agregar(p) {
            if (!ticketActivo) return;

            const item = ticketActivo.carrito.find(x => x.id === p.id);

            if (item) item.cantidad++;
            else ticketActivo.carrito.push({ ...p, cantidad: 1 });

            render();
        }

        function cambiarCantidad(id, delta) {
            const item = ticketActivo.carrito.find(x => x.id === id);
            item.cantidad += delta;

            if (item.cantidad <= 0) {
                ticketActivo.carrito = ticketActivo.carrito.filter(x => x.id !== id);
            }

            render();
        }

        function eliminar(id) {
            ticketActivo.carrito = ticketActivo.carrito.filter(x => x.id !== id);
            render();
        }

        function render() {
            const tbody = document.getElementById("carrito");
            tbody.innerHTML = "";

            if (!ticketActivo) return;

            let total = 0;

            ticketActivo.carrito.forEach(p => {
                const subtotal = p.precio * p.cantidad;
                total += subtotal;

                const tr = document.createElement("tr");

                tr.innerHTML = `
                <td>${p.nombre}</td>
                <td>${p.cantidad}</td>
                <td>$${p.precio}</td>
                <td>$${subtotal}</td>
                <td>
                    <button onclick="cambiarCantidad(${p.id},1)">+</button>
                    <button onclick="cambiarCantidad(${p.id},-1)">-</button>
                    <button onclick="eliminar(${p.id})">X</button>
                </td>
            `;

                tbody.appendChild(tr);
            });

            document.getElementById("total").innerText = total;
        }

        /* VENTA */
        async function finalizarVenta() {
            if (!ticketActivo || ticketActivo.carrito.length === 0) {
                mostrarToast("Carrito vacío");
                return;
            }

            const detalles = ticketActivo.carrito.map(p => ({
                productoId: p.id,
                cantidad: p.cantidad,
                subtotal: p.precio * p.cantidad
            }));

            const venta = {
                uuid: crypto.randomUUID(),
                fecha: new Date(),
                total: detalles.reduce((a, b) => a + b.subtotal, 0),
                detalles
            };

            try {
                await fetchTimeout("http://localhost:5210/ventas", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(venta)
                });

                mostrarToast("Venta enviada ✔");

            } catch {
                guardarOffline(venta);
                mostrarToast("Offline ✔");
            }

            tickets = tickets.filter(t => t.id !== ticketActivo.id);

            if (tickets.length > 0) ticketActivo = tickets[0];
            else nuevoTicket();

            renderTickets();
            render();
        }

        /* OFFLINE */
        function guardarOffline(venta) {
            let cola = JSON.parse(localStorage.getItem("colaVentas") || "[]");
            cola.push(venta);
            localStorage.setItem("colaVentas", JSON.stringify(cola));
        }

        async function sincronizar() {
            let cola = JSON.parse(localStorage.getItem("colaVentas") || "[]");

            if (cola.length === 0) return;

            let nuevas = [];

            for (let venta of cola) {
                try {
                    await fetchTimeout("http://localhost:5210/ventas", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(venta)
                    });
                } catch {
                    nuevas.push(venta);
                }
            }

            localStorage.setItem("colaVentas", JSON.stringify(nuevas));

            if (nuevas.length === 0) {
                mostrarToast("Sync OK ✔");
            }
        }

        /* UI */
        function mostrarToast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.style.display = "block";

            setTimeout(() => t.style.display = "none", 2500);
        }

        /* INIT */
        setInterval(sincronizar, 4000);
        cargarProductos();
        nuevoTicket();

    </script>

</body>
</html>
